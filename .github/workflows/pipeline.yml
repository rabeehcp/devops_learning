name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

# Environment variables available to ALL jobs
env:
  IMAGE_NAME: secrettt/devops-pipeline
  PYTHON_VERSION: '3.11'

jobs:

  # ════════════════════════════════
  # STAGE 1 — CODE QUALITY CHECK
  # ════════════════════════════════
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python files exist
        run: |
          echo "Checking project structure..."
          ls -la
          echo "Python files found:"
          find . -name "*.py" | head -20

      - name: Check for syntax errors
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" -exec python -m py_compile {} \;
          echo "No syntax errors found!"

  # ════════════════════════════════
  # STAGE 2 — RUN TESTS
  # ════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality      # only run if stage 1 passes!

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install flask pytest
          pip install -r github-actions/auto-docker/requirements.txt

      - name: Run tests
        run: |
          cd github-actions/auto-docker
          pytest test_app.py -v

      - name: Show test results
        run: echo "All tests passed successfully!"

  # ════════════════════════════════
  # STAGE 3 — BUILD DOCKER IMAGE
  # ════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test              # only run if stage 2 passes!

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          cd github-actions/auto-docker
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          echo "Image built successfully!"

      - name: Push to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Image pushed to Docker Hub!"

      - name: Show image info
        run: |
          echo "================================"
          echo "Image: ${{ env.IMAGE_NAME }}"
          echo "Tag: ${{ github.sha }}"
          echo "Built at: $(date)"
          echo "================================"

  # ════════════════════════════════
  # STAGE 4 — NOTIFY
  # ════════════════════════════════
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: build             # only run if stage 3 passes!

    steps:
      - name: Pipeline Success
        run: |
          echo "================================"
          echo "  CI/CD Pipeline Complete!"
          echo "================================"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Image   : ${{ env.IMAGE_NAME }}:latest"
          echo "  Time    : $(date)"
          echo "================================"
          echo "Image is live on Docker Hub!"
